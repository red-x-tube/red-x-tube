services:
  - type: web
    name: redxtube-api
    runtime: node
    rootDir: api-server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
