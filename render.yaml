databases:
  - name: redxtube-db
    plan: free
    databaseName: redxtube
    user: redxtube

services:
  - type: web
    name: redxtube-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install && cd api-server && pnpm run build && node migrate.mjs
    startCommand: node --enable-source-maps ./api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: redxtube-db
          property: connectionString
      - key: ADMIN_PASSWORD
        value: admin1234

  - type: web
    name: redxtube-frontend
    runtime: static
    buildCommand: npm install -g pnpm && pnpm install && cd red-x-tube && pnpm run build
    staticPublishPath: ./red-x-tube/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: redxtube-api
          type: web
          property: host
