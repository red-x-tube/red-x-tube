services:
  - type: web
    name: redxtube-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install && cd api-server && pnpm run build
    startCommand: node --enable-source-maps ./api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: redxtube-frontend
    runtime: static
    buildCommand: npm install -g pnpm && pnpm install && cd red-x-tube && pnpm run build
    staticPublishPath: ./red-x-tube/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
