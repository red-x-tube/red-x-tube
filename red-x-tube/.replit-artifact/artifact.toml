kind = "web"
previewPath = "/"
title = "Red-X Tube"
version = "1.0.0"
id = "artifacts/red-x-tube"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22024

[services.development]
run = "pnpm --filter @workspace/red-x-tube run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/red-x-tube", "run", "build" ]
publicDir = "artifacts/red-x-tube/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22024"
BASE_PATH = "/"
